<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="stylesheet" href="forged-logo.css">

<meta charset="UTF-8">
<title>Forged365 </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Forged365">

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg-main:#0b0b0b;
  --bg-card:#161616;
  --bg-soft:#1f1f1f;
  --border:#2b2b2b;

  --text-primary:#f2f2f2;
  --text-secondary:#cfcfcf;
  --text-tertiary:#9a9a9a;

  --ember:#ff7a2f;
  --ember-dark:#c94f11;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;
  background:radial-gradient(circle at top, rgba(255,122,47,.15), var(--bg-main) 55%);
  color:var(--text-primary);
}

.shell{max-width:680px;margin:0 auto}

.topbar{
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}
  /* ================= TOP BAR BRAND ================= */

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Static logo for header (no animation) */
.brand-logo {
  width: 22px;
  height: 22px;

  /* Use same asset as intro, but static */
  background: center / contain no-repeat;
  background: url('forged-logo.png');

  /* Subtle ember presence */
  filter:
    drop-shadow(0 0 4px rgba(255,122,47,0.5));
}

.logo{font-size:18px;font-weight:600}
.logo em{color:var(--ember);font-style:normal}

.nav{
  display:flex;
  gap:4px;
  background:var(--bg-main);
  border-radius:10px;
  padding:3px;
}
.nav button{
  background:none;
  border:none;
  padding:6px 12px;
  border-radius:7px;
  font-size:12px;
  color:var(--text-secondary);
  cursor:pointer;
}
.nav button.active{
  background:var(--bg-card);
  color:var(--text-primary);
}

.page{display:none;padding:16px}
.page.active{display:block}

.sec-label{
  font-size:10px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--text-tertiary);
  margin-bottom:10px;
}

.card{
  background:linear-gradient(to bottom,var(--bg-soft),var(--bg-card));
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:12px;
}

.start-btn{
  width:100%;
  background:linear-gradient(to bottom,var(--ember),var(--ember-dark));
  color:#120600;
  border:none;
  border-radius:10px;
  padding:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  margin-top:12px;
}

.modal-wrap{
  display:none;
  background:rgba(0,0,0,.85);
  position:fixed;
  inset:0;
  z-index:20;
  padding:16px;
}
.modal-wrap.open{display:block}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px
}
.modal-title{font-size:18px;font-weight:600}

.close-btn{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:7px;
  padding:5px 12px;
  cursor:pointer;
  color:var(--text-secondary);
}

.timer-box{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  text-align:center;
  margin-bottom:12px;
}
.timer-big{font-size:36px;font-variant-numeric:tabular-nums}
.timer-lbl{font-size:11px;color:var(--text-secondary);margin-top:4px}

.tbtn{
  border-radius:9px;
  padding:9px 18px;
  font-size:13px;
  cursor:pointer;
}
.tbtn-solid{
  background:var(--ember);
  border:none;
}
.tbtn-outline{
  background:none;
  border:1px solid var(--border);
  color:var(--text-primary);
}
  /* ================= ENTER THE FORGE INTRO ================= */

.forge-intro {
  position: fixed;
  inset: 0;
  background: radial-gradient(
    circle at top,
    rgba(255,122,47,0.25),
    #0b0b0b 60%
  );
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.6s ease;
}

.forge-intro.hidden {
  opacity: 0;
  pointer-events: none;
}

.forge-intro-inner {
  text-align: center;
  max-width: 420px;
  padding: 32px;
}

.forge-intro h1 {
  font-size: 36px;
  margin-bottom: 12px;
}

.forge-manifesto {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 28px;
}

.enter-forge-btn {
  background: linear-gradient(
    to bottom,
    var(--ember),
    var(--ember-dark)
  );
  border: none;
  border-radius: 12px;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  color: #120600;
}
  
/* ============ INTRO LOGO GLOW (WRAPPER-BASED) ============ */

.forge-symbol {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;

  filter:
    drop-shadow(0 0 18px rgba(255,122,47,0.55))
    drop-shadow(0 0 36px rgba(255,122,47,0.35));

  animation: forge-glow-wrapper 3.5s ease-in-out infinite;
}

@keyframes forge-glow-wrapper {
  0% {
    filter:
      drop-shadow(0 0 12px rgba(255,122,47,0.4))
      drop-shadow(0 0 24px rgba(255,122,47,0.25));
  }
  50% {
    filter:
      drop-shadow(0 0 26px rgba(255,122,47,0.75))
      drop-shadow(0 0 52px rgba(255,122,47,0.45));
  }
  100% {
    filter:
      drop-shadow(0 0 12px rgba(255,122,47,0.4))
      drop-shadow(0 0 24px rgba(255,122,47,0.25));
  }
}

  /* ================= EMBER BACKGROUND ================= */

.ember-field {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;

  background:
    radial-gradient(
      circle at 20% 85%,
      rgba(255, 122, 47, 0.18),
      transparent 45%
    ),
    radial-gradient(
      circle at 80% 25%,
      rgba(255, 122, 47, 0.14),
      transparent 50%
    ),
    radial-gradient(
      circle at 50% 60%,
      rgba(255, 170, 90, 0.10),
      transparent 55%
    );

  animation: ember-drift 26s ease-in-out infinite alternate;
}

/* Slow vertical warmth movement */
@keyframes ember-drift {
  from { transform: translateY(0); }
  to   { transform: translateY(-40px); }
}

/* Ensure app stays ABOVE embers */
.shell {
  position: relative;
  z-index: 2;
}
/* ================= WEEK VIEW ================= */

.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}

.week-day {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 4px;
  font-size: 10px;
  text-align: center;
  color: var(--text-secondary);
}

.week-day.today {
  border-color: var(--ember);
  color: var(--text-primary);
}

.week-day.complete {
  background: rgba(255,122,47,0.15);
  color: var(--text-primary);
}
  
/* ================= COMPLETION ================= */

.complete-ex {
  opacity: 0.6;
  text-decoration: line-through;
}

</style>
</head>

<body>

<!-- ENTER THE FORGE INTRO (GOES HERE) -->
  <div id="forge-intro" class="forge-intro">
    <div class="forge-intro-inner">
     <div class="forge-symbol">
  <div class="forged-logo"></div>
</div>

      <h1>Forged365</h1>

      <p class="forge-manifesto">
        The year is not consumed.<br>
        It is forged — one strike per day.
      </p>

      <button class="enter-forge-btn" onclick="enterForge()">
        Enter the Forge
      </button>
    </div>
  </div>

<!-- 🔥 EMBER BACKGROUND LAYER -->
  <div class="ember-field"></div>

<div class="shell">
<div class="topbar">

  <div class="brand">
    <div class="brand-logo"></div>
    <div class="logo">Forged<em>365</em></div>
  </div>

  <div class="nav">
    <button class="active" onclick="showPage('home',this)">Today</button>
    <button onclick="showPage('plan',this)">Year plan</button>
    <button onclick="showPage('library',this)">Exercises</button>
    <button onclick="showPage('recovery',this)">Recovery</button>
  </div>
 </div>

<div class="sec-label">This Week</div>
<div id="week-view" class="week-grid"></div>

  <div id="page-home" class="page active">
    <div class="sec-label">Today's session</div>
    <div class="card">
      <div id="today-session-title"></div>
<div id="today-session-list"></div>
      <button class="start-btn" onclick="openWorkout()">Strike the Iron →</button>
    </div>
  </div>

  <div id="page-plan" class="page">
    <div class="sec-label">Year plan</div>
    <div class="card">Plan view restored</div>
  </div>

  <div id="page-library" class="page">
    <div class="sec-label">Exercises</div>
    <div class="card">Exercise library restored</div>
  </div>

  <div id="page-recovery" class="page">
    <div class="sec-label">Recovery</div>
    <div class="card">Recovery guidance restored</div>
  </div>

</div>

<div class="modal-wrap" id="workout-modal">
  <div style="max-width:640px;margin:0 auto">
    <div class="modal-header">
      <div class="modal-title">Workout Session</div>
      <button class="close-btn" onclick="closeWorkout()">Close</button>
    </div>

    <div class="timer-box">
      <div class="timer-big" id="timer-disp">1:30</div>
      <div class="timer-lbl" id="timer-lbl">Rest timer</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
        <button class="tbtn tbtn-outline" onclick="resetTimer()">Reset</button>
        <button class="tbtn tbtn-solid" id="timer-tog" onclick="toggleTimer()">Start</button>
      </div>
    </div>
  </div>
</div>

<script>
  let selectedDayIndex = (new Date().getDay() + 6) % 7;

  /* ================= WORKOUT PROGRAM ================= */

// Basic weekly split (Day 1 = Monday)
const WEEK_SPLIT = [
  'Push',
  'Pull',
  'Legs',
  'Mobility',
  'Push',
  'Pull',
  'Rest'
];

const WORKOUTS = {
  Push: [
    'Push-ups — 3×12',
    'Incline push-ups — 3×10',
    'Shoulder taps — 3×20',
    'Bench dips — 3×10'
  ],
  Pull: [
    'Inverted rows — 3×10',
    'Band pull-aparts — 3×15',
    'Negative pull-ups — 3×5',
    'Dead hangs — 3×30s'
  ],
  Legs: [
    'Bodyweight squats — 4×15',
    'Reverse lunges — 3×10/side',
    'Glute bridges — 3×15',
    'Calf raises — 3×20'
  ],
  Mobility: [
    'Hip mobility flow — 10 min',
    'Thoracic rotations — 3×10',
    'Hamstring stretch — 3×30s',
    'Ankle mobility — 3×20'
  ],
  Rest: []
};

function getTodayWorkoutType() {
  const today = new Date();
  const dayIndex = (today.getDay() + 6) % 7; // Make Monday = 0
  return WEEK_SPLIT[selectedDayIndex];
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}

let timerSec=90,timerRunning=false,timerInterval=null;

function openWorkout(){
  document.getElementById('workout-modal').classList.add('open');
  resetTimer();
}

function closeWorkout(){
  document.getElementById('workout-modal').classList.remove('open');
  stopTimer();
}

function pad(n){return String(n).padStart(2,'0')}
function updateTimer(){
  document.getElementById('timer-disp').textContent=
    Math.floor(timerSec/60)+':'+pad(timerSec%60);
}
function toggleTimer(){timerRunning?stopTimer():startTimer()}
function startTimer(){
  timerRunning=true;
  document.getElementById('timer-tog').textContent='Pause';
  timerInterval=setInterval(()=>{
    timerSec--;updateTimer();
    if(timerSec<=0){stopTimer();}
  },1000);
}
function stopTimer(){
  timerRunning=false;
  clearInterval(timerInterval);
  document.getElementById('timer-tog').textContent='Start';
}
function resetTimer(){
  stopTimer();
  timerSec=90;
  updateTimer();
}
/* ================= ENTER THE FORGE LOGIC (OPTION C) ================= */

const FORGE_INTRO_VERSION = 'v1';
const INTRO_COOLDOWN_MS = 24 * 60 * 60 * 1000; // 24 hours

function enterForge() {
  localStorage.setItem(
    'forged_intro_state',
    JSON.stringify({
      version: FORGE_INTRO_VERSION,
      time: Date.now()
    })
  );
  document.getElementById('forge-intro').classList.add('hidden');
}

document.addEventListener('DOMContentLoaded', () => {
  const intro = document.getElementById('forge-intro');
  if (!intro) return;

  const saved = JSON.parse(localStorage.getItem('forged_intro_state'));

  const shouldHide =
    saved &&
    saved.version === FORGE_INTRO_VERSION &&
    Date.now() - saved.time < INTRO_COOLDOWN_MS;

  if (shouldHide) {
    intro.style.display = 'none';
  }
});
function renderTodaySession() {
  const type = getTodayWorkoutType();
  const titleEl = document.getElementById('today-session-title');
  const listEl = document.getElementById('today-session-list');

  titleEl.textContent =
    type === 'Rest'
      ? 'Rest Day'
      : `${type} Session`;

  listEl.innerHTML = '';

  if (type === 'Rest') {
    listEl.innerHTML =
      '<p style="color:var(--text-secondary); font-size:14px;">Active recovery, walking, and light mobility.</p>';
    return;
  }

  const exercises = WORKOUTS[type];

const today = new Date();
const dayIndex = (today.getDay() + 6) % 7;

const exerciseState = getExerciseCompletion();
const todayKey = `day-${dayIndex}`;

exercises.forEach((ex, i) => {
  const row = document.createElement('div');
  row.className = 'card';
  row.style.cursor = 'pointer';
  row.textContent = ex;

  // Restore completion state
  if (exerciseState[todayKey]?.includes(i)) {
    row.classList.add('complete-ex');
  }

  row.addEventListener('click', () => {
    row.classList.toggle('complete-ex');

    const completed = exerciseState[todayKey] || [];
    if (row.classList.contains('complete-ex')) {
      if (!completed.includes(i)) completed.push(i);
    } else {
      const idx = completed.indexOf(i);
      if (idx > -1) completed.splice(idx, 1);
    }

    exerciseState[todayKey] = completed;
    setExerciseCompletion(exerciseState);

    checkDayCompletion(dayIndex);
  });

  listEl.appendChild(row);
});
}

function renderWeekView() {
  const weekEl = document.getElementById('week-view');
  if (!weekEl) return;

  const today = new Date();
  const todayIndex = (today.getDay() + 6) % 7;

  weekEl.innerHTML = '';

  WEEK_SPLIT.forEach((type, i) => {
    const day = document.createElement('div');
    day.className = 'week-day';
    day.textContent = isDayComplete(i) ? `${type} ✓` : type;

    if (i === selectedDayIndex) day.classList.add('today');
    if (isDayComplete(i)) day.classList.add('complete');

    // ✅ CLICK HANDLER BELONGS HERE
    day.addEventListener('click', () => {
      selectedDayIndex = i;
      renderWeekView();
      renderTodaySession();
    });

    weekEl.appendChild(day);
  });
}

  WEEK_SPLIT.forEach((type, i) => {
    const day = document.createElement('div');
    day.className = 'week-day';
 day.textContent =
  isDayComplete(i)
    ? `${type} ✓`
    : type;


    if (i === todayIndex) day.classList.add('today');
    if (isDayComplete(i)) day.classList.add('complete');

    weekEl.appendChild(day);
  });
}
  
function getCompletionState() {
  return JSON.parse(localStorage.getItem('forged_completion') || '{}');
}

function setCompletionState(state) {
  localStorage.setItem('forged_completion', JSON.stringify(state));
}

function isDayComplete(dayIndex) {
  const state = getCompletionState();
  return state[dayIndex] === 'complete';
}

function checkDayCompletion(dayIndex) {
  const cards = document.querySelectorAll('#today-session-list .card');
  const allDone = [...cards].every(c => c.classList.contains('complete-ex'));

  const state = getCompletionState();
  state[dayIndex] = allDone ? 'complete' : 'incomplete';
  setCompletionState(state);

  renderWeekView();
}
function getExerciseCompletion() {
  return JSON.parse(localStorage.getItem('forged_exercises') || '{}');
}

function setExerciseCompletion(state) {
  localStorage.setItem('forged_exercises', JSON.stringify(state));
}


renderTodaySession();
  renderWeekView();
</script>

</body>
</html>
