<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Forged365</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Forged365">

<style>
/* ================= CORE TOKENS ================= */
:root {
  --bg-main: #0b0b0b;
  --bg-card: #1a1a1a;
  --bg-card-soft: #222;
  --border-soft: #2c2c2c;

  --text-primary: #f2f2f2;
  --text-secondary: #cfcfcf;
  --text-tertiary: #9a9a9a;

  --ember-main: #ff7a2f;
  --ember-dark: #c94f11;
}

/* ================= RESET ================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ================= PAGE ================= */
body {
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  background: radial-gradient(circle at top, rgba(255,122,47,0.15), var(--bg-main) 55%);
  color: var(--text-primary);
}

/* ================= LAYOUT ================= */
.shell {
  max-width: 680px;
  margin: 0 auto;
}

/* ================= TOP BAR ================= */
.topbar {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-soft);
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-size: 18px;
  font-weight: 600;
}

.logo em {
  color: var(--ember-main);
  font-style: normal;
}

.nav {
  display: flex;
  gap: 4px;
  background: var(--bg-main);
  border-radius: 10px;
  padding: 3px;
}

.nav button {
  background: none;
  border: none;
  padding: 6px 12px;
  border-radius: 7px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
}

.nav button.active {
  background: var(--bg-card);
  color: var(--text-primary);
}

/* ================= SECTIONS ================= */
.page {
  display: none;
  padding: 16px;
}

.page.active {
  display: block;
}

.sec-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}

/* ================= CARDS ================= */
.card {
  background: linear-gradient(to bottom, var(--bg-card-soft), var(--bg-card));
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}

/* ================= BUTTON ================= */
.start-btn {
  width: 100%;
  background: linear-gradient(to bottom, var(--ember-main), var(--ember-dark));
  color: #120600;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
}

/* ================= BADGES ================= */
.badge {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
}

/* ================= HIDE ACCESSIBILITY ================= */
.sr-only {
  position:absolute;
  width:1px;
  height:1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
}
</style>
</head>

<body>

<h2 class="sr-only">Forged365 — Year-long strength training program</h2>

<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">Forged<em>365</em></div>
    <div class="nav">
      <button class="active" onclick="showPage('home',this)">Today</button>
      <button onclick="showPage('plan',this)">Year plan</button>
      <button onclick="showPage('library',this)">Exercises</button>
      <button onclick="showPage('recovery',this)">Recovery</button>
    </div>
  </div>

  <!-- TODAY -->
  <div id="page-home" class="page active">
    <div class="sec-label">Today's Session</div>
    <div class="card">
      <div id="today-session-title">Loading…</div>
      <button class="start-btn" onclick="openWorkout()">Strike the Iron →</button>
    </div>
  </div>

  <!-- PLAN -->
  <div id="page-plan" class="page">
    <div class="sec-label">Year Plan</div>
    <div class="card">Plan view restored</div>
  </div>

  <!-- LIBRARY -->
  <div id="page-library" class="page">
    <div class="sec-label">Exercises</div>
    <div class="card">Library restored</div>
  </div>

  <!-- RECOVERY -->
  <div id="page-recovery" class="page">
    <div class="sec-label">Recovery</div>
    <div class="card">Recovery guidance restored</div>
  </div>

</div>

<script>
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
}

function openWorkout() {
  alert('Workout flow intact — next step is restoring modal once UI is stable.');
}
</script>

</body>
</html>
