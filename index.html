<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="stylesheet" href="forged-logo.css">

<meta charset="UTF-8">
<title>Forged365</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg-main:#0b0b0b;
  --bg-card:#161616;
  --bg-soft:#1f1f1f;
  --border:#2b2b2b;

  --text-primary:#f2f2f2;
  --text-secondary:#cfcfcf;
  --text-tertiary:#9a9a9a;

  --ember:#ff7a2f;
  --ember-dark:#c94f11;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;
  background:radial-gradient(circle at top, rgba(255,122,47,.15), var(--bg-main) 55%);
  color:var(--text-primary);
}

.shell{max-width:680px;margin:0 auto}

.topbar{
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}
  /* ================= TOP BAR BRAND ================= */

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Static logo for header (no animation) */
.brand-logo {
  width: 22px;
  height: 22px;

  /* Use same asset as intro, but static */
  background: center / contain no-repeat;
  background: url('forged-logo.png');

  /* Subtle ember presence */
  filter:
    drop-shadow(0 0 4px rgba(255,122,47,0.5));
}

.logo{font-size:18px;font-weight:600}
.logo em{color:var(--ember);font-style:normal}

.nav{
  display:flex;
  gap:4px;
  background:var(--bg-main);
  border-radius:10px;
  padding:3px;
}
.nav button{
  background:none;
  border:none;
  padding:6px 12px;
  border-radius:7px;
  font-size:12px;
  color:var(--text-secondary);
  cursor:pointer;
}
.nav button.active{
  background:var(--bg-card);
  color:var(--text-primary);
}

.page{display:none;padding:16px}
.page.active{display:block}

.sec-label{
  font-size:10px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--text-tertiary);
  margin-bottom:10px;
}

.card{
  background:linear-gradient(to bottom,var(--bg-soft),var(--bg-card));
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:12px;
}

.start-btn{
  width:100%;
  background:linear-gradient(to bottom,var(--ember),var(--ember-dark));
  color:#120600;
  border:none;
  border-radius:10px;
  padding:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  margin-top:12px;
}

.modal-wrap{
  display:none;
  background:rgba(0,0,0,.85);
  position:fixed;
  inset:0;
  z-index:20;
  padding:16px;
}
.modal-wrap.open{display:block}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px
}
.modal-title{font-size:18px;font-weight:600}

.close-btn{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:7px;
  padding:5px 12px;
  cursor:pointer;
  color:var(--text-secondary);
}

.timer-box{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  text-align:center;
  margin-bottom:12px;
}
.timer-big{font-size:36px;font-variant-numeric:tabular-nums}
.timer-lbl{font-size:11px;color:var(--text-secondary);margin-top:4px}

.tbtn{
  border-radius:9px;
  padding:9px 18px;
  font-size:13px;
  cursor:pointer;
}
.tbtn-solid{
  background:var(--ember);
  border:none;
}
.tbtn-outline{
  background:none;
  border:1px solid var(--border);
  color:var(--text-primary);
}
  /* ================= ENTER THE FORGE INTRO ================= */

.forge-intro {
  position: fixed;
  inset: 0;
  background: radial-gradient(
    circle at top,
    rgba(255,122,47,0.25),
    #0b0b0b 60%
  );
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.6s ease;
}

.forge-intro.hidden {
  opacity: 0;
  pointer-events: none;
}

.forge-intro-inner {
  text-align: center;
  max-width: 420px;
  padding: 32px;
}

.forge-intro h1 {
  font-size: 36px;
  margin-bottom: 12px;
}

.forge-manifesto {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 28px;
}

.enter-forge-btn {
  background: linear-gradient(
    to bottom,
    var(--ember),
    var(--ember-dark)
  );
  border: none;
  border-radius: 12px;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  color: #120600;
}
  
/* ============ INTRO LOGO GLOW (WRAPPER-BASED) ============ */

.forge-symbol {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;

  filter:
    drop-shadow(0 0 18px rgba(255,122,47,0.55))
    drop-shadow(0 0 36px rgba(255,122,47,0.35));

  animation: forge-glow-wrapper 3.5s ease-in-out infinite;
}

@keyframes forge-glow-wrapper {
  0% {
    filter:
      drop-shadow(0 0 12px rgba(255,122,47,0.4))
      drop-shadow(0 0 24px rgba(255,122,47,0.25));
  }
  50% {
    filter:
      drop-shadow(0 0 26px rgba(255,122,47,0.75))
      drop-shadow(0 0 52px rgba(255,122,47,0.45));
  }
  100% {
    filter:
      drop-shadow(0 0 12px rgba(255,122,47,0.4))
      drop-shadow(0 0 24px rgba(255,122,47,0.25));
  }
}

  /* ================= EMBER BACKGROUND ================= */

.ember-field {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;

  background:
    radial-gradient(
      circle at 20% 85%,
      rgba(255, 122, 47, 0.18),
      transparent 45%
    ),
    radial-gradient(
      circle at 80% 25%,
      rgba(255, 122, 47, 0.14),
      transparent 50%
    ),
    radial-gradient(
      circle at 50% 60%,
      rgba(255, 170, 90, 0.10),
      transparent 55%
    );

  animation: ember-drift 26s ease-in-out infinite alternate;
}

/* Slow vertical warmth movement */
@keyframes ember-drift {
  from { transform: translateY(0); }
  to   { transform: translateY(-40px); }
}

/* Ensure app stays ABOVE embers */
.shell {
  position: relative;
  z-index: 2;
}

</style>
</head>

<body>

<!-- ENTER THE FORGE INTRO (GOES HERE) -->
  <div id="forge-intro" class="forge-intro">
    <div class="forge-intro-inner">
     <div class="forge-symbol">
  <div class="forged-logo"></div>
</div>

      <h1>Forged365</h1>

      <p class="forge-manifesto">
        The year is not consumed.<br>
        It is forged — one strike per day.
      </p>

      <button class="enter-forge-btn" onclick="enterForge()">
        Enter the Forge
      </button>
    </div>
  </div>

<!-- 🔥 EMBER BACKGROUND LAYER -->
  <div class="ember-field"></div>

<div class="shell">
<div class="topbar">

  <div class="brand">
    <div class="brand-logo"></div>
    <div class="logo">Forged<em>365</em></div>
  </div>

  <div class="nav">
    <button class="active" onclick="showPage('home',this)">Today</button>
    <button onclick="showPage('plan',this)">Year plan</button>
    <button onclick="showPage('library',this)">Exercises</button>
    <button onclick="showPage('recovery',this)">Recovery</button>
  </div>
 </div>

  <div id="page-home" class="page active">
    <div class="sec-label">Today's session</div>
    <div class="card">
      <div id="today-session-title">Push session</div>
      <button class="start-btn" onclick="openWorkout()">Strike the Iron →</button>
    </div>
  </div>

  <div id="page-plan" class="page">
    <div class="sec-label">Year plan</div>
    <div class="card">Plan view restored</div>
  </div>

  <div id="page-library" class="page">
    <div class="sec-label">Exercises</div>
    <div class="card">Exercise library restored</div>
  </div>

  <div id="page-recovery" class="page">
    <div class="sec-label">Recovery</div>
    <div class="card">Recovery guidance restored</div>
  </div>

</div>

<div class="modal-wrap" id="workout-modal">
  <div style="max-width:640px;margin:0 auto">
    <div class="modal-header">
      <div class="modal-title">Workout Session</div>
      <button class="close-btn" onclick="closeWorkout()">Close</button>
    </div>

    <div class="timer-box">
      <div class="timer-big" id="timer-disp">1:30</div>
      <div class="timer-lbl" id="timer-lbl">Rest timer</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
        <button class="tbtn tbtn-outline" onclick="resetTimer()">Reset</button>
        <button class="tbtn tbtn-solid" id="timer-tog" onclick="toggleTimer()">Start</button>
      </div>
    </div>
  </div>
</div>

<script>
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}

let timerSec=90,timerRunning=false,timerInterval=null;

function openWorkout(){
  document.getElementById('workout-modal').classList.add('open');
  resetTimer();
}

function closeWorkout(){
  document.getElementById('workout-modal').classList.remove('open');
  stopTimer();
}

function pad(n){return String(n).padStart(2,'0')}
function updateTimer(){
  document.getElementById('timer-disp').textContent=
    Math.floor(timerSec/60)+':'+pad(timerSec%60);
}
function toggleTimer(){timerRunning?stopTimer():startTimer()}
function startTimer(){
  timerRunning=true;
  document.getElementById('timer-tog').textContent='Pause';
  timerInterval=setInterval(()=>{
    timerSec--;updateTimer();
    if(timerSec<=0){stopTimer();}
  },1000);
}
function stopTimer(){
  timerRunning=false;
  clearInterval(timerInterval);
  document.getElementById('timer-tog').textContent='Start';
}
function resetTimer(){
  stopTimer();
  timerSec=90;
  updateTimer();
}
  /* ================= ENTER THE FORGE LOGIC ================= */

// CHANGE THIS VERSION STRING if you want the intro to show again
const FORGE_INTRO_VERSION = 'v1';

function enterForge() {
  localStorage.setItem('forged_intro_seen', FORGE_INTRO_VERSION);
  document.getElementById('forge-intro').classList.add('hidden');
}


// SHOW INTRO ONLY IF USER HAS NOT DISMISSED IT
document.addEventListener('DOMContentLoaded', () => {
  const intro = document.getElementById('forge-intro');
  const seenVersion = localStorage.getItem('forged_intro_seen');

  if (!intro) return;

  if (seenVersion === FORGE_INTRO_VERSION) {
    // User already entered the forge before — never show intro
    intro.style.display = 'none';
  }
});


</script>

</body>
</html>
